<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Domain For Sale</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: #f5f5f5;
      font-family: 'Segoe UI', Arial, sans-serif;
    }

    .card {
      background: #ffffff;
      border: 1px solid #e0e0e0;
      border-radius: 12px;
      padding: 56px 48px;
      max-width: 480px;
      width: 90%;
      text-align: center;
      box-shadow: 0 4px 24px rgba(0,0,0,0.07);
    }

    .label {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #888;
      margin-bottom: 16px;
    }

    .tag {
      display: inline-block;
      background: #1a73e8;
      color: #fff;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      padding: 6px 18px;
      border-radius: 20px;
      margin-bottom: 28px;
    }

    h1 {
      font-size: 32px;
      font-weight: 700;
      color: #111;
      margin-bottom: 8px;
      letter-spacing: -0.5px;
    }

    .sub {
      font-size: 15px;
      color: #666;
      margin-bottom: 40px;
    }

    .divider {
      border: none;
      border-top: 1px solid #e8e8e8;
      margin-bottom: 32px;
    }

    .contact-label {
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: #aaa;
      margin-bottom: 20px;
    }

    .contact-item {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 14px;
    }

    .contact-item:last-child { margin-bottom: 0; }

    .icon {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: #f0f4ff;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .icon svg {
      width: 16px;
      height: 16px;
      fill: #1a73e8;
    }

    .contact-item a {
      font-size: 16px;
      font-weight: 600;
      color: #111;
      text-decoration: none;
    }

    .contact-item a:hover {
      color: #1a73e8;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="tag">For Sale</div>

    <h1>This Domain is For Sale</h1>
    <p class="sub">Interested? Get in touch directly.</p>

    <hr class="divider" />

    <p class="contact-label">Contact</p>

    <div class="contact-item">
      <div class="icon">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M20 4H4C2.9 4 2 4.9 2 6v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/>
        </svg>
      </div>
      <a href="mailto:akashselva03@gmail.com">akashselva03@gmail.com</a>
    </div>

    <div class="contact-item">
      <div class="icon">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M6.62 10.79a15.05 15.05 0 006.59 6.59l2.2-2.2a1 1 0 011.01-.24c1.12.37 2.33.57 3.58.57a1 1 0 011 1V20a1 1 0 01-1 1C10.61 21 3 13.39 3 4a1 1 0 011-1h3.5a1 1 0 011 1c0 1.25.2 2.46.57 3.58a1 1 0 01-.25 1.01l-2.2 2.2z"/>
        </svg>
      </div>
      <a href="tel:+919994669013">+91 99946 69013</a>
    </div>
  </div>
</body>
</html>
